# Egress proxy for jsbench agent containers — BLOCKLIST model (per Jace).
# Default-ALLOW general internet so agents can consult reference/programming
# material (math wikis, language docs, OEIS, arXiv, etc.), but DENY an
# empirical set of hosts where a Jane Street puzzle solution could live
# (the source site, code hosts, search engines, video/social writeup hubs).
# The agent container has no direct route to the internet — this proxy is the
# only path — so every request is subject to this filter and is logged.
Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 32
LogLevel Info

# Default allow; the filter file lists DENY patterns.
FilterDefaultDeny No
Filter "/etc/tinyproxy/filter"
FilterExtended Yes
FilterURLs Off
# Filter applies to CONNECT (HTTPS) too.
FilterCaseSensitive Off

ConnectPort 443
ConnectPort 563
