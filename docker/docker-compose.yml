# jsbench isolated runtime.
#   docker compose -f docker/docker-compose.yml up -d proxy
#   docker compose -f docker/docker-compose.yml run --rm agent \
#       bash docker/verify_isolation.sh          # gate check
#   docker compose -f docker/docker-compose.yml run --rm agent \
#       python3 -m orchestrate.runner --phase0
#
# `bench_internal` has no external route; the agent reaches the world only
# through the proxy sidecar, which enforces the api.anthropic.com allowlist.
services:
  proxy:
    build: ./proxy
    networks: [bench_internal, egress]
    restart: unless-stopped

  agent:
    build: .
    # Claude Code refuses bypassPermissions as root — run as the node user
    user: node
    # Runaway solvers (e.g. vectorized 10M-range brute force) have ballooned
    # past 10GB and crashed the whole WSL VM (SIGBUS storms killing every
    # concurrent run). Cap the container so an OOM stays inside the offending
    # run; 8g comfortably covers every legitimately observed peak (~5.6GB).
    mem_limit: 8g
    # No core dumps (see agent-codex): a crashing solver otherwise writes a
    # multi-GB WSL crash dump to the C drive.
    ulimits:
      core: 0
    environment:
      - HOME=/home/node
      - HTTPS_PROXY=http://proxy:8888
      - HTTP_PROXY=http://proxy:8888
      - NO_PROXY=localhost,127.0.0.1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    # Isolation model (2026-07-22, after the mount-leak finding):
    #   - the whole repo is mounted READ-ONLY so the agent can import the
    #     harness code, but cannot write anywhere except its own run dir;
    #   - /bench/data and /bench/runs are wiped to empty tmpfs, hiding EVERY
    #     answer-bearing file: data/graders (answers), data/raw (solution_md),
    #     data/review_sheet.md (answers+solutions), and runs/ (all prior
    #     transcripts + run.json grader_snapshots);
    #   - only the clean puzzle bundles (data/puzzles, problem+images+metadata,
    #     no answers) are mounted back read-only;
    #   - the orchestrator binds THIS run's writable output dir at /out (a
    #     path OUTSIDE /bench) and sets JSB_RUN_DIR=/out; run_agent writes there
    #     and the host reads it back as runs/<id>/. Grading is HOST-side only.
    volumes:
      - ..:/bench:ro
      - ../data/puzzles:/bench/data/puzzles:ro
    tmpfs:
      - /bench/data
      - /bench/runs
    working_dir: /bench
    networks: [bench_internal]
    depends_on: [proxy]

  # --- OpenAI / Codex harness (mirror of proxy + agent above) ---------------
  # Symmetric isolation: identical to the Claude services except the inference
  # endpoint. proxy-codex allows api.openai.com and blocks anthropic.com (+ the
  # same solution sources); agent-codex runs the Codex CLI instead of Claude
  # Code. Same read-only repo, same answer-store tmpfs masks, same /out bind.
  proxy-codex:
    build:
      context: ./proxy
      args:
        FILTER: filter.codex
    networks: [bench_internal_codex, egress]
    restart: unless-stopped

  agent-codex:
    build:
      context: ..
      dockerfile: docker/Dockerfile.codex
    user: node
    mem_limit: 8g
    # Disable core dumps: hard-puzzle solvers occasionally segfault/OOM, and WSL
    # writes a multi-GB core dump to the Windows host (C:\...\Temp\wsl-crashes)
    # per crash, which fills the C drive. The crash itself is isolated to its
    # container; we don't need the dump. (New `compose run` containers pick this
    # up immediately — no restart needed.)
    ulimits:
      core: 0
    environment:
      - HOME=/home/node
      - HTTPS_PROXY=http://proxy-codex:8888
      - HTTP_PROXY=http://proxy-codex:8888
      - NO_PROXY=localhost,127.0.0.1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ..:/bench:ro
      - ../data/puzzles:/bench/data/puzzles:ro
    tmpfs:
      - /bench/data
      - /bench/runs
    working_dir: /bench
    networks: [bench_internal_codex]
    depends_on: [proxy-codex]

networks:
  bench_internal:
    internal: true      # no direct egress for agents
  bench_internal_codex:
    internal: true      # no direct egress for codex agents
  egress: {}
