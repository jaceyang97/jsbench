# jsbench global configuration
# Verified 2026-07-19 against locally installed toolchain.

harness:
  # Pinned Claude Code version 2.1.215 (latest as of 2026-07-19, per Jace).
  # AUTHORITATIVE BINARY: the claude-agent-sdk (0.2.123) wheel bundles
  # claude.exe 2.1.215 and prefers it over PATH — the SDK wheel version pins
  # the harness. Host-native install also updated to 2.1.215 (CLI fallback).
  # Pin in Docker with: npm i -g @anthropic-ai/claude-code@2.1.215
  claude_code_version: "2.1.215"
  agent_sdk_version: "0.2.123"
  # Flag audit for 2.1.215 (via `claude --help`), unchanged from 2.1.90:
  #   PRESENT: -p/--print, --output-format json, --model, --max-budget-usd (print-only),
  #            --allowedTools/--disallowedTools, --permission-mode (incl. bypassPermissions),
  #            --append-system-prompt, --dangerously-skip-permissions, --bare,
  #            --effort <low|medium|high|max>, --json-schema, --no-session-persistence,
  #            --fallback-model (print-only), --settings, --setting-sources
  #   ABSENT:  --max-turns  <-- turn caps must come from the Agent SDK (max_turns option)
  #            or, in CLI mode, solely from --max-budget-usd + wall-clock timeout.
  max_turns_flag_available: false
  # Windows-local note: nested `claude` invocations need CLAUDE_CODE_GIT_BASH_PATH set;
  # irrelevant inside the Linux container.
  runner_default: sdk        # sdk | cli
  effort: default            # do not override effort; record actual value per run

concurrency: 24              # measured limit 2026-07-21: API (Scale tier, per-model buckets,
                             # OTPM 2M vs p95 ~8K/run => 150+ per model) is NOT binding;
                             # local VM (30GB/16 cores) + wall-clock fairness for compute-heavy
                             # runs (occasional 5GB+/full-core solvers) caps practical concurrency
# 45 min hard kill per SESSION (covers all N feedback-guided attempts).
# Cost is independently capped by max_budget_usd; this is the safety net so a
# multi-attempt session on a hard puzzle isn't truncated mid-attempt.
wall_clock_timeout_s: 2700

budget:
  hard_cap_usd: 780          # circuit breaker across all runs (Phase 0 + 1)
  phase0_estimate_usd: 12
  phase1_estimate_usd: 178

retries:
  infra_max: 2               # retry only API 5xx / network errors
  wrong_answer: 0            # never retry incorrect answers

paths:
  raw: data/raw
  puzzles: data/puzzles
  graders: data/graders
  runs: runs
  runs_log: runs/runs.jsonl

scrape:
  base_url: "https://www.janestreet.com/puzzles/archive/"
  current_url: "https://www.janestreet.com/puzzles/current-puzzle/"
  # Leaderboard JSON endpoint (from jspuzzleLB): puzzles/{puzzle_id}-leaderboard.json
  # -> {"leaders": [names]}. Available for puzzles from 2015-11 onward.
  leaderboard_min_date: "2015-11"
  delay_s: 1.5               # polite scraping interval
  user_agent: "jsbench-research/0.1 (LLM benchmark data collection; contact: jaceyang8@gmail.com)"

network_isolation:
  # Phase 0 may run on host; Phase 1 REQUIRES container + egress allowlist.
  allowlist:
    - api.anthropic.com
  # add if telemetry errors appear: statsig.anthropic.com, sentry.io
  disable_nonessential_traffic: true   # CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
